name: Build Docker base images user (Ubuntu + Alpine + Debian-Slim)

on:
  schedule:
    - cron: "0 0 * * 1"
  # Per-(OS x Node) checkboxes. The catalogue of available combinations
  # lives in .github/build-matrix.json - add a row there, then add a
  # matching input below. Input names must be: <os_id_with_-_and_._mapped_to__>_node_<node_id>.
  # Scheduled runs ignore inputs and use default_enabled from the JSON.
  workflow_dispatch:
    inputs:
      # >>> BEGIN auto-generated dispatch inputs (from build-matrix.json — run .github/scripts/sync-dispatch-inputs.mjs to update)
      ubuntu_24_04_node_22:
        description: 'Ubuntu 24.04 + Node 22.x'
        type: boolean
        default: false
      ubuntu_24_04_node_24:
        description: 'Ubuntu 24.04 + Node 24.x'
        type: boolean
        default: true
      ubuntu_26_04_node_22:
        description: 'Ubuntu 26.04 + Node 22.x'
        type: boolean
        default: false
      ubuntu_26_04_node_24:
        description: 'Ubuntu 26.04 + Node 24.x'
        type: boolean
        default: true
      alpine_node_22:
        description: 'Alpine + Node 22'
        type: boolean
        default: false
      alpine_node_24:
        description: 'Alpine + Node 24'
        type: boolean
        default: true
      debian_node_22:
        description: 'Debian + Node 22'
        type: boolean
        default: false
      debian_node_24:
        description: 'Debian + Node 24'
        type: boolean
        default: false
      # <<< END auto-generated dispatch inputs

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_REPO: kegustafsson/signalk-server-base
  DOCKER_HUB_REPO: kgustafs/signalk-server-base
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare matrices
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      variant_matrix: ${{ steps.matrix.outputs.variant_matrix }}
      any_enabled: ${{ steps.matrix.outputs.any_enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Compute matrices
        id: matrix
        env:
          # Schedule runs leave inputs empty -> fall back to default_enabled in build-matrix.json.
          ENABLED_JSON: ${{ toJSON(github.event.inputs) }}
        run: |
          set -euo pipefail

          # Cross-product os_variants x node_versions from .github/build-matrix.json,
          # then filter by the per-row dispatch checkbox (or by default_enabled
          # for scheduled runs).
          variants=$(jq -c \
            --argjson enabled "${ENABLED_JSON:-null}" '
            (if ($enabled | type) == "object" then $enabled else {} end) as $en
            | .os_variants as $os | .node_versions as $nodes
            | [ $os[] as $o | $nodes[] as $n |
                (($o.id | gsub("[-.]"; "_")) + "_node_" + $n.id) as $key |
                {
                  enabled: ($en[$key] // (if ($o.default_enabled and $n.default_enabled) then "true" else "false" end)),
                  family:     $o.family,
                  os_label:   $o.os_arg,
                  node:       (if $o.family == "ubuntu" then "\($n.id).x" else $n.id end),
                  node_id:    $n.id,
                  dockerfile: $o.dockerfile,
                  build_test: $o.build_test,
                  login_dhi:  $o.login_dhi
                }
              ]
            | map(select(.enabled == "true"))
            | map(del(.enabled))
          ' .github/build-matrix.json)

          # Build matrix: cross-product variants x architectures.
          # Per-node extra_platforms append to the arch's base platform
          # (e.g. Node 22 adds linux/arm/v7 to arm64). exclude_archs drops
          # archs entirely for a given node. Both lists are defined in
          # .github/build-matrix.json on the node_versions row.
          # NB: arch suffix is amd/arm (id_base) - kept stable to match existing base image tags.
          build_matrix=$(jq -c \
            --argjson variants "$variants" '
            (.node_versions | map({(.id): .}) | add) as $node_index
            | .architectures as $archs
            | [ $variants[] as $v |
                $node_index[$v.node_id] as $n |
                $archs[] as $a |
                select(((($n.exclude_archs // []) | index($a.id_user)) | not)) |
                (($n.extra_platforms // {})[$a.id_user] // "") as $extra |
                ($v + {
                  arch:     $a.id_base,
                  vm:       $a.vm,
                  platform: (if $extra == "" then $a.platform else "\($a.platform),\($extra)" end)
                })
              ]
          ' .github/build-matrix.json)

          # Variant matrix: one row per variant (used by manifest + copy jobs).
          variant_matrix=$(echo "$variants" | jq -c '[ .[] | {os_label, node} ]')

          count=$(echo "$variants" | jq 'length')
          if [[ "$count" -gt 0 ]]; then
            echo "any_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_enabled=false" >> "$GITHUB_OUTPUT"
          fi
          echo "build_matrix=$build_matrix" >> "$GITHUB_OUTPUT"
          echo "variant_matrix=$variant_matrix" >> "$GITHUB_OUTPUT"

          echo "Enabled variants:"
          echo "$variants" | jq

  build:
    name: Build ${{ matrix.os_label }} node-${{ matrix.node }} ${{ matrix.arch }}
    needs: [prepare]
    if: needs.prepare.outputs.any_enabled == 'true'
    runs-on: ${{ matrix.vm }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Login to dhi.io
        if: matrix.login_dhi
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}:${{ matrix.arch }}-${{ matrix.os_label }}-${{ matrix.node }}
          build-args: |
            NODE=${{ matrix.node }}

      # Ubuntu-only smoke test: rebuild the user image against the base we just pushed.
      - name: Modify Dockerfile_rel for testing
        if: matrix.build_test
        run: |
          sed -i \
            "s|:latest|:${{ matrix.arch }}-${{ matrix.os_label }}-${{ matrix.node }}|g" \
            ./docker/Dockerfile_rel_user
      - name: Build Signal K test docker
        if: matrix.build_test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile_rel_user
          platforms: ${{ matrix.platform }}
          build-args: |
            TAG=latest

  manifest:
    name: Manifest ${{ matrix.os_label }} node-${{ matrix.node }}
    needs: [prepare, build]
    if: ${{ !cancelled() && needs.prepare.outputs.any_enabled == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.variant_matrix) }}
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Create and push multi-arch manifest to GHCR
        uses: int128/docker-manifest-create-action@v2
        with:
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}:latest-${{ matrix.os_label }}-${{ matrix.node }}
          sources: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}:amd-${{ matrix.os_label }}-${{ matrix.node }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}:arm-${{ matrix.os_label }}-${{ matrix.node }}

  copy-to-dockerhub:
    name: Copy ${{ matrix.os_label }} node-${{ matrix.node }} to Docker Hub
    needs: [prepare, manifest]
    if: ${{ !cancelled() && needs.prepare.outputs.any_enabled == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.variant_matrix) }}
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo
      - name: Copy GHCR -> Docker Hub
        shell: bash
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          skopeo copy --all \
            --src-creds "${GHCR_USERNAME}:${GHCR_TOKEN}" \
            --dest-creds "${DOCKER_HUB_USERNAME}:${DOCKER_HUB_ACCESS_TOKEN}" \
            "docker://${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}:latest-${{ matrix.os_label }}-${{ matrix.node }}" \
            "docker://docker.io/${{ env.DOCKER_HUB_REPO }}:latest-${{ matrix.os_label }}-${{ matrix.node }}"

  housekeeping:
    name: Housekeeping
    if: ${{ always() && needs.copy-to-dockerhub.result == 'success' }}
    needs: [copy-to-dockerhub]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Remove intermediate per-arch images from GHCR
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: signalk-server-base
          delete-untagged: true
          delete-tags: amd-*,arm-*
          token: ${{ secrets.GHCR_TOKEN_NEW }}

  slack:
    name: Slack update
    if: always()
    runs-on: ubuntu-latest
    needs: [housekeeping, copy-to-dockerhub]
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.copy-to-dockerhub.result }}" == "failure" || "${{ needs.housekeeping.result }}" == "failure" ]]; then
            echo "message=❌ Base image build failed" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.copy-to-dockerhub.result }}" == "cancelled" || "${{ needs.housekeeping.result }}" == "cancelled" ]]; then
            echo "message=⚠️ Base image build was cancelled" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.housekeeping.result }}" == "success" ]]; then
            echo "message=✅ Ubuntu 24.04 + Alpine base images ready" >> "$GITHUB_OUTPUT"
          else
            echo "message=⚠️ Base image build completed with issues" >> "$GITHUB_OUTPUT"
          fi
      - name: Slack notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${{ steps.status.outputs.message }}\"}" \
            https://hooks.slack.com/services/${{ secrets.SLACK }}
