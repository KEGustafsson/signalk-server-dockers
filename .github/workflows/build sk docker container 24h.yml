name: SignalK Docker Build 24h

on:
  schedule:
    - cron: "0 1 * * *"
  # Per-(OS x Node) checkboxes. The catalogue of available combinations
  # lives in .github/build-matrix.json - add a row there, then add a
  # matching input below. Input names must be: <os_id_with_-_and_._mapped_to__>_node_<node_id>.
  # Scheduled runs ignore inputs and use default_enabled from the JSON.
  workflow_dispatch:
    inputs:
      # >>> BEGIN auto-generated dispatch inputs (from build-matrix.json — run .github/scripts/sync-dispatch-inputs.mjs to update)
      ubuntu_24_04_node_22:
        description: 'Ubuntu 24.04 + Node 22.x'
        type: boolean
        default: false
      ubuntu_24_04_node_24:
        description: 'Ubuntu 24.04 + Node 24.x'
        type: boolean
        default: true
      ubuntu_24_04_node_26:
        description: 'Ubuntu 24.04 + Node 26.x'
        type: boolean
        default: true
      ubuntu_26_04_node_22:
        description: 'Ubuntu 26.04 + Node 22.x'
        type: boolean
        default: false
      ubuntu_26_04_node_24:
        description: 'Ubuntu 26.04 + Node 24.x'
        type: boolean
        default: true
      ubuntu_26_04_node_26:
        description: 'Ubuntu 26.04 + Node 26.x'
        type: boolean
        default: true
      alpine_node_22:
        description: 'Alpine + Node 22'
        type: boolean
        default: false
      alpine_node_24:
        description: 'Alpine + Node 24'
        type: boolean
        default: true
      alpine_node_26:
        description: 'Alpine + Node 26'
        type: boolean
        default: true
      debian_node_22:
        description: 'Debian + Node 22'
        type: boolean
        default: false
      debian_node_24:
        description: 'Debian + Node 24'
        type: boolean
        default: false
      debian_node_26:
        description: 'Debian + Node 26'
        type: boolean
        default: false
      # <<< END auto-generated dispatch inputs

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_REPO: kegustafsson/signalk-server
  DOCKER_HUB_REPO: kgustafs/signalk-server
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-new-v-tags:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Fetch and compare tags
        id: check
        run: |
          EXTERNAL_REPO="SignalK/signalk-server"
          tags_response=$(curl -s "https://api.github.com/repos/$EXTERNAL_REPO/tags")
          if [ -z "$tags_response" ] || [ "$tags_response" == "null" ]; then
              echo "Failed to fetch tags from GitHub API."
              exit 1
          fi
          if echo "$tags_response" | jq -e 'type == "object" and has("message")' > /dev/null 2>&1; then
              error_message=$(echo "$tags_response" | jq -r '.message')
              echo "GitHub API error: $error_message"
              exit 1
          fi
          tags_count=$(echo "$tags_response" | jq '. | length')
          if [ "$tags_count" -eq 0 ]; then
              echo "No tags found in repository."
              exit 0
          fi
          echo "Found $tags_count total tags"
          latest_v_tag=""
          latest_v_tag_commit_sha=""
          for i in $(seq 0 $((tags_count - 1))); do
              tag_name=$(echo "$tags_response" | jq -r ".[$i].name")
              if [[ "$tag_name" =~ ^v.* ]]; then
                  latest_v_tag="$tag_name"
                  latest_v_tag_commit_sha=$(echo "$tags_response" | jq -r ".[$i].commit.sha")
                  echo "Found latest v* tag: $latest_v_tag"
                  echo "Commit SHA: $latest_v_tag_commit_sha"
                  break
              fi
          done
          if [ -z "$latest_v_tag" ]; then
              echo "No valid v* tags found."
              exit 0
          fi
          echo "Fetching commit details..."
          commit_details=$(curl -s "https://api.github.com/repos/$EXTERNAL_REPO/commits/$latest_v_tag_commit_sha")
          if [ -z "$commit_details" ] || [ "$commit_details" == "null" ]; then
              echo "Failed to fetch commit details."
              exit 1
          fi
          commit_error=$(echo "$commit_details" | jq -r '.message // empty')
          if [ -n "$commit_error" ]; then
              echo "GitHub API error fetching commit: $commit_error"
              exit 1
          fi
          commit_date=$(echo "$commit_details" | jq -r '.commit.committer.date // .commit.author.date // empty')
          if [ -z "$commit_date" ] || [ "$commit_date" == "null" ]; then
              echo "Failed to extract commit date."
              exit 1
          fi
          echo "Commit date: $commit_date"
          current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          time_24h_ago=$(date -u -d "$current_time - 24 hours" +"%Y-%m-%dT%H:%M:%SZ")
          commit_epoch=$(date -u -d "$commit_date" +%s)
          current_epoch=$(date -u -d "$current_time" +%s)
          time_diff_seconds=$((current_epoch - commit_epoch))
          days=$((time_diff_seconds / 86400))
          hours=$(( (time_diff_seconds % 86400) / 3600 ))
          minutes=$(( (time_diff_seconds % 3600) / 60 ))
          seconds=$((time_diff_seconds % 60))
          echo "Time difference: ${days}d ${hours}h ${minutes}m ${seconds}s"
          echo "Tag/Commit Date: $commit_date"
          echo "Current Time: $current_time"
          echo "24h ago threshold: $time_24h_ago"
          if [[ "$commit_date" > "$time_24h_ago" ]]; then
              echo "✅ New v* tag $latest_v_tag found in the last 24 hours."
              echo "proceed=true" >> $GITHUB_OUTPUT
          else
              echo "❌ No new v* tags found in the last 24 hours."
              echo "Latest v* tag is $latest_v_tag (${days}d ${hours}h ${minutes}m old)"
              echo "proceed=false" >> $GITHUB_OUTPUT
          fi

  signalk-server:
    name: SignalK Server build
    needs: [check-new-v-tags]
    if: ${{ needs.check-new-v-tags.outputs.proceed == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tags.outputs.tag }}
      major: ${{ steps.tags.outputs.major }}
      minor: ${{ steps.tags.outputs.minor }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Node setup
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: signalk-server tags
        id: tags
        run: |
          tag=$(curl -fsSL https://api.github.com/repos/SignalK/signalk-server/releases/latest \
                | jq -r .tag_name)
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "Extracted tag: $tag"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${tag//v/}"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR.$MINOR" >> $GITHUB_OUTPUT
      - name: signalk-server download and patch
        run: |
          git clone https://github.com/SignalK/signalk-server.git
          cd signalk-server
          applied=false
          for dir in ./../patch/[0-9]*/; do
            if [ -d "$dir" ] && ls "$dir"*.patch 1>/dev/null 2>&1; then
              echo "Applying patches from $(basename "$dir")"
              git apply "$dir"*.patch
              applied=true
            fi
          done
          if [ "$applied" = false ]; then echo "No patches to apply"; fi
      - name: signalk-server build
        run: |
          cd signalk-server
          rm -f package-lock.json
          rm -rf node_modules
          npm cache clean -f
          npm install npm@latest -g
          npm install --package-lock-only
          npm ci && npm cache clean --force
          npm run build:all
          npm pack --workspaces
          rm -f signalk-typedoc-signalk-theme*.tgz
          npm pack
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          retention-days: 1
          name: packed-modules
          path: ./signalk-server/*.tgz

  # Computes which variants are enabled and emits matrices used by the
  # build / manifest / copy jobs. The OS x Node catalogue lives in
  # .github/build-matrix.json - this step just cross-products it and
  # filters by the per-row workflow_dispatch checkboxes (or by
  # default_enabled for scheduled runs).
  prepare:
    name: Prepare matrices and tags
    needs: [signalk-server]
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
      variant_matrix: ${{ steps.matrix.outputs.variant_matrix }}
      any_enabled: ${{ steps.matrix.outputs.any_enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Compute matrices
        id: matrix
        env:
          TAG: ${{ needs.signalk-server.outputs.tag }}
          MAJOR_V: v${{ needs.signalk-server.outputs.major }}
          MINOR_V: v${{ needs.signalk-server.outputs.major }}.${{ needs.signalk-server.outputs.minor }}
          GHCR_PREFIX: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}
          HUB_PREFIX: ${{ env.DOCKER_HUB_REPO }}
          ENABLED_JSON: ${{ toJSON(github.event.inputs) }}
        run: |
          set -euo pipefail
          IS_BETA=$([[ "$TAG" == *beta* ]] && echo "true" || echo "false")

          # Cross-product os_variants x node_versions, filter by the
          # per-row dispatch checkbox (or by default_enabled for scheduled runs),
          # then attach full + short tags. manifest_short_tags[0] is mirrored
          # to Docker Hub as the primary alias.
          variants=$(jq -c \
            --arg tag "$TAG" \
            --arg major "$MAJOR_V" \
            --arg minor "$MINOR_V" \
            --arg ghcr "$GHCR_PREFIX" \
            --arg hub "$HUB_PREFIX" \
            --arg isbeta "$IS_BETA" \
            --argjson enabled "${ENABLED_JSON:-null}" '
            (if ($enabled | type) == "object" then $enabled else {} end) as $en
            | .os_variants as $os | .node_versions as $nodes
            | [ $os[] as $o | $nodes[] as $n |
                (($o.id | gsub("[-.]"; "_")) + "_node_" + $n.id) as $key |
                {
                  enabled: ($en[$key] // (if ($o.default_enabled and $n.default_enabled) then "true" else "false" end)),
                  os_label: ($o.user_os_label // $o.id),
                  os_arg:   $o.os_arg,
                  node:     (if $o.family == "ubuntu" then "\($n.id).x" else $n.id end),
                  node_id:  $n.id,
                  manifest_short_tags: ($o.manifest_short_tags[$n.id] // [])
                }
              ]
            | map(select(.enabled == "true"))
            | map(
                .os_label as $ol | .node as $nv |
                . + {
                  primary_short_tag: .manifest_short_tags[0],
                  full_tags: (
                    (if $isbeta == "true" then [$tag, "latest"]
                     else [$tag, $major, $minor, "latest"] end)
                    | map(["\($ghcr):\(.)-\($ol)-\($nv)", "\($hub):\(.)-\($ol)-\($nv)"])
                    | flatten
                  )
                }
              )
            | map(del(.enabled))
          ' .github/build-matrix.json)

          # Build matrix: cross-product variants x architectures.
          # Per-node extra_platforms append to the arch's base platform
          # (e.g. Node 22 adds linux/arm/v7 to arm64). exclude_archs drops
          # archs entirely for a given node. Both lists are defined in
          # .github/build-matrix.json on the node_versions row.
          build_matrix=$(jq -c \
            --argjson variants "$variants" '
            (.node_versions | map({(.id): .}) | add) as $node_index
            | .architectures as $archs
            | [ $variants[] as $v |
                $node_index[$v.node_id] as $n |
                $archs[] as $a |
                select(((($n.exclude_archs // []) | index($a.id_user)) | not)) |
                (($n.extra_platforms // {})[$a.id_user] // "") as $extra |
                {
                  os_label: $v.os_label,
                  os_arg:   $v.os_arg,
                  node:     $v.node,
                  arch:     $a.id_user,
                  vm:       $a.vm,
                  platform: (if $extra == "" then $a.platform else "\($a.platform),\($extra)" end)
                }
              ]
          ' .github/build-matrix.json)

          # Variant matrix: one row per variant (used by manifest + copy jobs).
          variant_matrix=$(echo "$variants" | jq -c '
            [ .[] | {os_label, node, manifest_short_tags, primary_short_tag, full_tags} ]')

          count=$(echo "$variants" | jq 'length')
          if [[ "$count" -gt 0 ]]; then
            echo "any_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_enabled=false" >> "$GITHUB_OUTPUT"
          fi
          echo "build_matrix=$build_matrix" >> "$GITHUB_OUTPUT"
          echo "variant_matrix=$variant_matrix" >> "$GITHUB_OUTPUT"

          echo "Enabled variants:"
          echo "$variants" | jq

  build:
    name: Build ${{ matrix.os_label }} node-${{ matrix.node }} ${{ matrix.arch }}
    needs: [signalk-server, prepare]
    if: needs.prepare.outputs.any_enabled == 'true'
    permissions:
      contents: read
      packages: write
    runs-on: ${{ matrix.vm }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: packed-modules
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile_user
          platforms: ${{ matrix.platform }}
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}:${{ matrix.arch }}-${{ matrix.os_label }}-${{ matrix.node }}-${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ matrix.os_arg }}-${{ matrix.node }}

  manifest:
    name: Manifest ${{ matrix.os_label }} node-${{ matrix.node }}
    needs: [prepare, build]
    # Run per-variant best-effort: don't block on a sibling variant's build failure.
    if: ${{ !cancelled() && needs.prepare.outputs.any_enabled == 'true' }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.variant_matrix) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Wait for arch images
        run: |
          set -euo pipefail
          for arch in amd64 arm64; do
            image="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}:${arch}-${{ matrix.os_label }}-${{ matrix.node }}-${{ github.sha }}"
            echo "Checking: $image"
            for i in {1..60}; do
              if docker manifest inspect "$image" > /dev/null 2>&1; then
                echo "✓ Image available: $image"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "✗ TIMEOUT: Image not available after 10 minutes: $image"
                echo "This usually means the build job failed or is still running."
                exit 1
              fi
              if [ $((i % 6)) -eq 0 ]; then
                echo "Still waiting... ($i/60) - $(date)"
              fi
              sleep 10
            done
          done
      - name: Collect manifest tags
        id: tags
        env:
          GHCR_PREFIX: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}
          FULL_TAGS_JSON: ${{ toJSON(matrix.full_tags) }}
          SHORT_TAGS_JSON: ${{ toJSON(matrix.manifest_short_tags) }}
        run: |
          set -euo pipefail
          {
            echo 'TAGS<<EOF'
            jq -r '.[]' <<<"$FULL_TAGS_JSON" | grep "^${GHCR_PREFIX}:" || true
            jq -r --arg p "$GHCR_PREFIX" '.[] | "\($p):\(.)"' <<<"$SHORT_TAGS_JSON"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Create and push multi-arch manifest to GHCR
        uses: int128/docker-manifest-create-action@v2
        with:
          tags: ${{ steps.tags.outputs.TAGS }}
          sources: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}:amd64-${{ matrix.os_label }}-${{ matrix.node }}-${{ github.sha }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}:arm64-${{ matrix.os_label }}-${{ matrix.node }}-${{ github.sha }}

  copy-to-dockerhub:
    name: Copy ${{ matrix.os_label }} node-${{ matrix.node }} to Docker Hub
    needs: [prepare, manifest]
    if: ${{ !cancelled() && needs.prepare.outputs.any_enabled == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.variant_matrix) }}
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo
      - name: Copy GHCR -> Docker Hub
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
          GHCR_PREFIX: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_REPO }}
          HUB_PREFIX: docker.io/${{ env.DOCKER_HUB_REPO }}
          FULL_TAGS_JSON: ${{ toJSON(matrix.full_tags) }}
          PRIMARY_SHORT_TAG: ${{ matrix.primary_short_tag }}
        run: |
          set -euo pipefail
          {
            jq -r '.[]' <<<"$FULL_TAGS_JSON" | grep "^${GHCR_PREFIX}:" || true
            echo "${GHCR_PREFIX}:${PRIMARY_SHORT_TAG}"
          } | awk '!seen[$0]++' > ghcr_tags.txt

          if [[ ! -s ghcr_tags.txt ]]; then
            echo "ERROR: No GHCR tags to copy"
            exit 1
          fi

          echo "Tags to copy:"
          cat ghcr_tags.txt

          while IFS= read -r ghcr_image; do
            [ -z "$ghcr_image" ] && continue
            tag="${ghcr_image##*:}"
            hub_image="${HUB_PREFIX}:${tag}"
            echo "Copying: $ghcr_image -> $hub_image"
            if ! skopeo copy --all \
              --retry-times 3 \
              --src-creds "${GHCR_USERNAME}:${GHCR_TOKEN}" \
              --dest-creds "${DOCKER_HUB_USERNAME}:${DOCKER_HUB_ACCESS_TOKEN}" \
              "docker://${ghcr_image}" \
              "docker://${hub_image}"; then
              echo "ERROR: Failed to copy $ghcr_image"
              exit 1
            fi
            echo "✓ Successfully copied: $tag"
          done < ghcr_tags.txt

  housekeeping:
    name: Housekeeping
    if: always()
    needs: [copy-to-dockerhub]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Check if any copy succeeded
        id: check
        run: |
          if [[ "${{ needs.copy-to-dockerhub.result }}" == "success" ]]; then
            echo "cleanup=true" >> "$GITHUB_OUTPUT"
          else
            echo "cleanup=false" >> "$GITHUB_OUTPUT"
            echo "Skipping cleanup - no successful copies"
          fi
      - name: Delete all workflow artifacts
        if: steps.check.outputs.cleanup == 'true'
        uses: geekyeggo/delete-artifact@v5
        with:
          name: '*'
          failOnError: false
      - name: Remove intermediate Docker Images from GHCR
        if: steps.check.outputs.cleanup == 'true'
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: signalk-server
          delete-untagged: true
          delete-tags: |
            *-${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

  slack:
    name: Slack notification
    if: always() && needs.signalk-server.result != 'skipped'
    runs-on: ubuntu-latest
    needs: [housekeeping, signalk-server, copy-to-dockerhub]
    steps:
      - name: Determine status
        id: status
        run: |
          TAG="${{ needs.signalk-server.outputs.tag }}"
          if [[ "${{ needs.signalk-server.result }}" == "failure" || "${{ needs.copy-to-dockerhub.result }}" == "failure" || "${{ needs.housekeeping.result }}" == "failure" ]]; then
            echo "message=❌ Docker build workflow failed for $TAG" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.signalk-server.result }}" == "cancelled" || "${{ needs.copy-to-dockerhub.result }}" == "cancelled" || "${{ needs.housekeeping.result }}" == "cancelled" ]]; then
            echo "message=⚠️ Docker build workflow was cancelled for $TAG" >> "$GITHUB_OUTPUT"
          elif [[ "${{ needs.housekeeping.result }}" == "success" ]]; then
            echo "message=✅ Docker images successfully built and published: $TAG" >> "$GITHUB_OUTPUT"
          else
            echo "message=⚠️ Docker build workflow completed with issues for $TAG" >> "$GITHUB_OUTPUT"
          fi
      - name: Send Slack notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${{ steps.status.outputs.message }}\"}" \
            https://hooks.slack.com/services/${{ secrets.SLACK }}
