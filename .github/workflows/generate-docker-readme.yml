ARCH_DETAILS="$(jq -r '
  (.images // [])
  | map(
      select(
        (.os // "") != ""
        and (.architecture // "") != ""
        and (.os != "unknown")
        and (.architecture != "unknown")
      )
      | {
          platform:
            (if (.variant // "") != "" then
              "\(.os)/\(.architecture)/\(.variant)"
            else
              "\(.os)/\(.architecture)"
            end),
          size_mb: ((.size // 0) / 1000000 | floor)
        }
    )
  | unique_by(.platform)
  | sort_by(.platform)
  | if length == 0 then
      "n/a"
    else
      map("<div><code>\(.platform)</code><br>\(.size_mb) MB</div>")
      | join("<br>")
    end
' "${TMP_FILE}")"
